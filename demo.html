<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naive UI 按钮示例</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/naive-ui@2.44.1/dist/index.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 40px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #18a058;
            margin-bottom: 30px;
            text-align: center;
        }
        .section {
            margin-bottom: 30px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }
        .info {
            background: #fff7e6;
            border: 1px solid #ffd591;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 30px;
        }
        .info-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #d48806;
        }
        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <h1>Naive UI 按钮示例演示</h1>

            <div class="info">
                <div class="info-title">📝 说明</div>
                <div>这是一个静态演示页面，展示 Naive UI 按钮的各种样式和用法。</div>
                <div style="margin-top: 10px;">要运行完整的 Vue 3 项目，请先解决 Rolldownd 绑定问题（参考 <code>解决方案.md</code> 文件）。</div>
            </div>

            <!-- 基础按钮类型 -->
            <div class="section">
                <div class="section-title">基础按钮类型</div>
                <n-space>
                    <n-button>默认按钮</n-button>
                    <n-button type="tertiary">次要按钮</n-button>
                    <n-button type="primary">主要按钮</n-button>
                    <n-button type="info">信息按钮</n-button>
                    <n-button type="success">成功按钮</n-button>
                    <n-button type="warning">警告按钮</n-button>
                    <n-button type="error">错误按钮</n-button>
                </n-space>
            </div>

            <!-- 不同尺寸的按钮 -->
            <div class="section">
                <div class="section-title">不同尺寸的按钮</div>
                <n-space>
                    <n-button size="tiny">微小按钮</n-button>
                    <n-button size="small">小按钮</n-button>
                    <n-button size="medium">中等按钮</n-button>
                    <n-button size="large">大按钮</n-button>
                </n-space>
            </div>

            <!-- 不同的按钮状态 -->
            <div class="section">
                <div class="section-title">不同的按钮状态</div>
                <n-space>
                    <n-button disabled>禁用按钮</n-button>
                    <n-button loading>加载中</n-button>
                    <n-button @click="handleClick">点击我</n-button>
                </n-space>
            </div>

            <!-- 虚线按钮和边框按钮 -->
            <div class="section">
                <div class="section-title">特殊样式按钮</div>
                <n-space>
                    <n-button dashed>虚线按钮</n-button>
                    <n-button border>边框按钮</n-button>
                    <n-button circle>
                        <template #icon>
                            <span style="font-size: 16px;">👍</span>
                        </template>
                    </n-button>
                </n-space>
            </div>

            <!-- 图标按钮 -->
            <div class="section">
                <div class="section-title">图标按钮示例</div>
                <n-space>
                    <n-button>
                        <template #icon>
                            <span>📝</span>
                        </template>
                        编辑
                    </n-button>
                    <n-button type="primary">
                        <template #icon>
                            <span>💾</span>
                        </template>
                        保存
                    </n-button>
                    <n-button type="error">
                        <template #icon>
                            <span>🗑️</span>
                        </template>
                        删除
                    </n-button>
                </n-space>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        const { NButton, NSpace, useMessage } = naive;

        const app = createApp({
            setup() {
                const message = useMessage();

                const handleClick = () => {
                    message.success('按钮被点击了！');
                };

                return {
                    handleClick
                };
            }
        });

        // 注册 Naive UI 组件
        Object.keys(naive).forEach(key => {
            if (key.startsWith('N')) {
                app.component(key, naive[key]);
            }
        });

        app.mount('#app');
    </script>
</body>
</html>
